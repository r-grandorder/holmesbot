name: Refresh assets

# Re-sync the servant index from Atlas (NA + JP-only), re-extract silhouettes to S3,
# and commit the updated shadows.json. That commit triggers Build, which re-bakes the
# manifest into the image, so new servants flow into /guessshadow and /guessshadowjp
# with no manual work. Asset hosting stays on S3 (intentional). Manual-trigger for now;
# add a `schedule:` block here to run it weekly.
on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC to AWS
  contents: write # commit the refreshed manifest

concurrency: refresh-assets

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Sync index (NA + JP) + precompute silhouettes
        env:
          ASSETS_BUCKET: bunyanbot-assets-327760835875
        run: |
          pip install -r scripts/requirements-precompute.txt
          python scripts/sync_atlas.py
          python scripts/sync_atlas.py --jp
          python scripts/precompute_silhouettes.py
      - name: Commit refreshed manifest if changed
        run: |
          git config user.name "holmesbot-refresh[bot]"
          git config user.email "noreply@holmesbot.com"
          git add data/shadows.json
          if git diff --cached --quiet; then
            echo "No manifest changes."
          else
            git commit -m "chore: refresh shadow manifest (scheduled)"
            git push
          fi
